site_name: site_manager_docs
repo_url: https://github.com/jan-ldwg/site_manager_server
edit_uri: https://github.com/jan-ldwg/site_manager_docs/tree/main/docs
site_description: Documentation for the site_manager software application
site_author: Jan Ludwig
copyright: Copyright &copy; 2025 - 2026 Jan Ludwig

watch:
  - ./

plugins:
  - search
  - neoteroi.mkdocsoad:
      use_pymdownx: true

extra_css:
  - css/mkdocsoad.css

theme:
  name: material

  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - content.code.copy
    - content.links.external
    - navigation.instant
    - navigation.sections
    - content.action.edit
    - content.footnote.tooltips

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

#-------------site structure

nav:
  - Home: index.md
  - Installation: installation.md
  - Release Notes: releasenotes.md
  - Tutorial:
      - Getting started: tutorial/gettingstarted.md
      - Basic concepts: tutorial/concepts.md
      - Wiring diagram: tutorial/wiringdiagram.md
      - Cable list: tutorial/cablelist.md
      - Device list: tutorial/devicelist.md
  - Library:
      - Overview: library/overview.md
      - Create templates: library/create.md
      - Contribute: library/contribute.md
      #- Connectors: library/connectors.md
      #- Signals: library/signals.md
  #- Data Model:
  #- Device Types: datamodel/devicetype.md
  #- Devices: datamodel/devices.md
  - API:
      - Overview: api/overview.md
      - Scripting: api/scripting.md
      - Schema: api/api_docs.md
