openapi: 3.1.0

info:
  title: site_manager
  version: "1.0"

servers:
  - url: http://example.com/api
    description: Since site_manager is hosted locally the URL depends on your setup

paths:
  /devices:
    summary: Instances of physical devices

    get:
      summary: Read a list of devices
      parameters:
        - $ref: "#/components/parameters/siteId"
        - $ref: "#/components/parameters/buildingId"
        - $ref: "#/components/parameters/roomId"
        - $ref: "#/components/parameters/rackId"
      responses:
        "200":
          description: List retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceList"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      summary: Add a device
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCreate"
      responses:
        "201":
          description: Device added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"

  /devices/{deviceId}:
    summary: Single device Instances
    parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Return information of a single device
      responses:
        "200":
          description: Information of the device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    patch:
      summary: Update a device
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: Device successfully modified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
    delete:
      summary: Delete a device
      responses:
        "204":
          description: Device deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /ports/{portId}:
    summary: Port attached to a device or moduleId
    parameters:
      - name: portId
        in: path
        required: true
        schema: {}
    get:
      summary: Return information of a single port
      responses:
        "200":
          description: Information about the port
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Port"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /modules:
    summary: Modules installed in devices
    get:
      summary: Get a list of all modules
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleList"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

    post:
      summary: Create a new module
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleCreate"
      responses:
        "201":
          description: Module added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"

  /modules/{moduleId}:
