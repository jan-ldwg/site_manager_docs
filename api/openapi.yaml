        "200":
          description: List of cables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CableList"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      summary: Add a new cableId
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CableCreate"
      responses:
        "201":
          description: Cable added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cable"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
  /cables/{cableId}:
    summary: Cable connecting devices
    parameters:
