        - $ref: "#/components/parameters/startRoomId"
        - $ref: "#/components/parameters/startBuildingId"
        - $ref: "#/components/parameters/endRackId"
        - $ref: "#/components/parameters/endRoomId"
        - $ref: "#/components/parameters/endBuildingId"
